# Render Blueprint (API-only) for Vercel + Supabase + Render setup
# Docs: https://render.com/docs/blueprint-spec
#
# Required manual env vars on flames-api:
# - DATABASE_URL (Supabase direct PostgreSQL URL, include ?sslmode=require)
# - CORS_ORIGINS (comma-separated Vercel domains, e.g. https://flames-longton.vercel.app)
# Optional:
# - REDIS_URL (defaults to in-memory carts via "memory")
# - STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET

services:
  - type: web
    name: flames-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@9.15.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @flames/api... build
    startCommand: >-
      pnpm --filter @flames/database migrate:deploy &&
      pnpm --filter @flames/database seed &&
      pnpm --filter @flames/api start
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        value: memory
      - key: CORS_ORIGINS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
