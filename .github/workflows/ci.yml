name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flames
          POSTGRES_PASSWORD: flames_dev
          POSTGRES_DB: flames_longton
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @flames/shared test
      - run: pnpm --filter @flames/api test
        env:
          DATABASE_URL: postgresql://flames:flames_dev@localhost:5432/flames_longton
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
